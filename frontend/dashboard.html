<!doctype html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sysu Track | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link
            href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap"
            rel="stylesheet"
    />
    <link href="./src/style/main.css" rel="stylesheet"/>
    <link href="./src/style/dashboard.css" rel="stylesheet"/>

    <!-- Leaflet Engine (Standard Open Source Map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "bg-dark": "#1a1a1e",
                        "bg-panel": "#222227",
                        "bg-row": "#28282e",
                        accent: "#2979ff",
                        "border-custom": "#333338",
                    },
                    fontFamily: {
                        ui: ["Syne", "sans-serif"],
                        mono: ["DM Mono", "monospace"],
                    },
                },
            },
        };
    </script>
    <style>
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #333338;
            border-radius: 2px;
        }

        .dragging {
            border-color: #2979ff !important;
            transition: none;
        }

        #open-map-sdk {
            contain: strict;
        }

        /* Ensure Leaflet takes full container */
        .leaflet-container {
            background: #121214 !important;
        }
    </style>
</head>
<body class="bg-bg-dark text-gray-100 font-ui h-screen overflow-hidden">
<div id="app" class="flex h-full">
    <nav
            id="sidebar"
            class="w-14 flex flex-col items-center py-3 bg-bg-dark border-r border-border-custom z-40"
    >
        <div
                class="w-9 h-9 rounded-full bg-border-custom flex items-center justify-center text-[9px] text-gray-500 text-center mb-2"
        >
            LOGO
        </div>

        <div
                class="w-[3px] flex-1 bg-accent rounded-full my-2 opacity-90 shadow-[0_0_10px_rgba(41,121,255,0.25)]"
        ></div>

        <div class="flex flex-col items-center gap-3 mt-auto pb-4">
            <button
                    class="group relative w-8 h-8 rounded-full bg-bg-panel border border-border-custom flex items-center justify-center hover:border-accent transition-all"
                    title="Settings"
            >
                <svg
                        class="w-4 h-4 stroke-gray-400 fill-none stroke-[1.8]"
                        viewBox="0 0 24 24"
                >
                    <circle cx="12" cy="12" r="3"/>
                    <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
                    />
                </svg>
            </button>

            <button
                    id="logout-btn"
                    class="group relative w-8 h-8 rounded-full bg-bg-panel border border-border-custom flex items-center justify-center hover:border-red-500/50 hover:bg-red-500/10 transition-all"
                    title="Logout"
            >
                <svg
                        class="w-4 h-4 stroke-gray-400 group-hover:stroke-red-400 fill-none stroke-[1.8]"
                        viewBox="0 0 24 24"
                >
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
        </div>
    </nav>
    <main class="flex-1 flex flex-col min-w-0 relative">
        <header
                class="h-12 flex items-center gap-3 px-4 bg-bg-dark/80 backdrop-blur-md border-b border-border-custom shrink-0 z-30"
        >
            <div
                    class="w-7 h-7 rounded-full bg-border-custom flex items-center justify-center text-[8px] text-gray-500"
            >
                LOGO
            </div>
            <span
                    class="text-xs font-semibold tracking-widest text-gray-400 uppercase font-mono"
            >Sysu Track Monitor</span
            >
        </header>

        <section class="absolute inset-0 z-0 pt-12 overflow-hidden">
            <!-- FIX: Added z-index and forced relative height for Leaflet -->
            <div
                    id="open-map-sdk"
                    class="w-full h-full bg-[#121214] z-0"
                    style="min-height: 100%; width: 100%; display: block;"
            >
                <!-- Leaflet will mount here -->
            </div>
        </section>

        <div class="flex-1 pointer-events-none z-10"></div>

        <section
                id="resize-panel"
                class="relative z-20 h-48 min-h-[40px] max-h-[80vh] bg-bg-panel/95 backdrop-blur-md border-t-2 border-border-custom flex flex-col shrink-0 overflow-hidden shadow-[0_-10px_40px_rgba(0,0,0,0.7)]"
        >
            <div
                    id="drawer-handle"
                    class="h-6 w-full flex items-center justify-center cursor-ns-resize hover:bg-white/5 transition-colors group shrink-0"
            >
                <div
                        class="w-12 h-1 rounded-full bg-border-custom group-hover:bg-accent transition-all duration-300"
                ></div>
            </div>

            <div
                    class="flex items-center gap-2 px-4 py-2 border-b border-border-custom shrink-0"
            >
            <span
                    class="text-xs font-semibold tracking-widest uppercase font-mono"
            >Live Monitor</span
            >
                <span
                        class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-green-500/10 text-green-400 text-[9px] font-bold font-mono uppercase"
                >
              <span class="relative flex h-1.5 w-1.5">
                <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"
                ></span>
                <span
                        class="relative inline-flex rounded-full h-1.5 w-1.5 bg-green-500"
                ></span>
              </span>
              Online
            </span>
            </div>

            <div class="overflow-auto flex-1">
                <table
                        class="w-full text-left border-collapse font-mono text-[11px] min-w-[800px]"
                >
                    <thead
                            class="sticky top-0 bg-bg-panel border-b border-border-custom z-10"
                    >
                    <tr>
                        <th
                                class="px-4 py-3 text-[9px] font-medium tracking-widest text-gray-500 uppercase"
                        >
                            Shipment ID
                        </th>
                        <th
                                class="px-4 py-3 text-[9px] font-medium tracking-widest text-gray-500 uppercase"
                        >
                            Status
                        </th>
                        <th
                                class="px-4 py-3 text-[9px] font-medium tracking-widest text-gray-500 uppercase"
                        >
                            Customer
                        </th>
                        <th
                                class="px-4 py-3 text-[9px] font-medium tracking-widest text-gray-500 uppercase"
                        >
                            Driver
                        </th>
                        <th
                                class="px-4 py-3 text-[9px] font-medium tracking-widest text-gray-500 uppercase"
                        >
                            Location
                        </th>
                        <th
                                class="px-4 py-3 text-[9px] font-medium tracking-widest text-gray-500 uppercase"
                        >
                            Activity
                        </th>
                        <th
                                class="px-4 py-3 text-[9px] font-medium tracking-widest text-gray-500 uppercase"
                        >
                            Transit Duration
                        </th>
                    </tr>
                    </thead>
                    <tbody id="shipment-rows" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<script type="module" src="./src/main.js"></script>
<script type="module" src="./src/pages/dashboard.js"></script>
</body>
</html>
